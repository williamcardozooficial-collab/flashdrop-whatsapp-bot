<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashDrop - Painel WhatsApp</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #ff6b00, #ff9500); padding: 20px 30px; display: flex; align-items: center; gap: 15px; }
  .header h1 { font-size: 24px; font-weight: 700; }
  .header span { font-size: 14px; opacity: 0.85; }
  .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .card { background: #1a1a1a; border-radius: 16px; padding: 24px; border: 1px solid #2a2a2a; }
  .card h2 { font-size: 16px; color: #aaa; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }
  .status-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
  .status-dot.connected { background: #00d26a; box-shadow: 0 0 8px #00d26a; }
  .status-dot.disconnected { background: #ff4444; }
  .status-dot.waiting { background: #ffaa00; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .status-text { font-size: 20px; font-weight: 600; }
  .phone { color: #aaa; font-size: 14px; margin-top: 8px; }
  #qr-container { text-align: center; }
  #qr-img { max-width: 220px; border-radius: 12px; background: white; padding: 10px; }
  .no-qr { color: #666; font-size: 14px; padding: 40px 0; }
  .btn { background: linear-gradient(135deg, #ff6b00, #ff9500); color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; width: 100%; margin-top: 16px; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .logs-card { background: #1a1a1a; border-radius: 16px; padding: 24px; border: 1px solid #2a2a2a; }
  .logs-card h2 { font-size: 16px; color: #aaa; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }
  #logs-list { max-height: 300px; overflow-y: auto; }
  .log-item { padding: 8px 12px; border-radius: 8px; margin-bottom: 6px; font-size: 13px; display: flex; gap: 10px; align-items: flex-start; }
  .log-item.incoming { background: #1e2d1e; border-left: 3px solid #00d26a; }
  .log-item.outgoing { background: #1e2a35; border-left: 3px solid #4da6ff; }
  .log-item.system { background: #2a2a1e; border-left: 3px solid #ffaa00; }
  .log-time { color: #666; font-size: 11px; white-space: nowrap; }
  .log-msg { color: #ddd; word-break: break-word; }
  .no-logs { color: #555; text-align: center; padding: 30px 0; font-size: 14px; }
  @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>⚡ FlashDrop</h1>
    <span>Painel de Controle WhatsApp</span>
  </div>
</div>
<div class="container">
  <div class="grid">
    <div class="card">
      <h2>Status da Conexão</h2>
      <div>
        <span class="status-dot disconnected" id="status-dot"></span>
        <span class="status-text" id="status-text">Carregando...</span>
      </div>
      <div class="phone" id="status-phone"></div>
      <button class="btn" id="btn-restart" onclick="restart()">🔄 Reconectar</button>
    </div>
    <div class="card">
      <h2>QR Code WhatsApp</h2>
      <div id="qr-container">
        <div class="no-qr" id="qr-loading">Carregando...</div>
        <img id="qr-img" style="display:none" alt="QR Code">
      </div>
    </div>
  </div>
  <div class="logs-card">
    <h2>📋 Logs de Mensagens</h2>
    <div id="logs-list"><div class="no-logs">Nenhum log ainda...</div></div>
  </div>
</div>
<script>
async function fetchStatus() {
  try {
    const r = await fetch('/api/status');
    const d = await r.json();
    const dot = document.getElementById('status-dot');
    const text = document.getElementById('status-text');
    const phone = document.getElementById('status-phone');
    dot.className = 'status-dot';
    if (d.connected) {
      dot.classList.add('connected');
      text.textContent = 'Conectado';
      phone.textContent = '📱 ' + d.phone;
    } else if (d.state === 'AGUARDANDO_QR') {
      dot.classList.add('waiting');
      text.textContent = 'Aguardando QR';
      phone.textContent = 'Escaneie o QR Code';
    } else {
      dot.classList.add('disconnected');
      text.textContent = d.state || 'Desconectado';
      phone.textContent = '';
    }
  } catch(e) {}
}

async function fetchQR() {
  try {
    const r = await fetch('/api/qrcode');
    const d = await r.json();
    const img = document.getElementById('qr-img');
    const loading = document.getElementById('qr-loading');
    if (d.qr) {
      img.src = d.qr;
      img.style.display = 'block';
      loading.style.display = 'none';
    } else {
      img.style.display = 'none';
      loading.style.display = 'block';
      loading.textContent = 'WhatsApp conectado ou aguardando...';
    }
  } catch(e) {}
}

async function fetchLogs() {
  try {
    const r = await fetch('/api/logs');
    const logs = await r.json();
    const list = document.getElementById('logs-list');
    if (!logs.length) { list.innerHTML = '<div class="no-logs">Nenhum log ainda...</div>'; return; }
    list.innerHTML = logs.slice(0,30).map(l => {
      const t = new Date(l.timestamp).toLocaleTimeString('pt-BR');
      return '<div class="log-item ' + l.type + '"><span class="log-time">' + t + '</span><span class="log-msg">' + escHtml(l.message) + '</span></div>';
    }).join('');
  } catch(e) {}
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function restart() {
  const btn = document.getElementById('btn-restart');
  btn.disabled = true;
  btn.textContent = 'Reiniciando...';
  try {
    await fetch('/api/restart', { method: 'POST' });
  } catch(e) {}
  setTimeout(() => { btn.disabled = false; btn.textContent = '🔄 Reconectar'; }, 3000);
}

function refresh() {
  fetchStatus();
  fetchQR();
  fetchLogs();
}

refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
