<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashDrop - Painel WhatsApp</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #ff6b00, #ff9500); padding: 20px 30px; display: flex; align-items: center; gap: 15px; }
  .header h1 { font-size: 24px; font-weight: 700; }
  .header span { font-size: 14px; opacity: 0.85; }
  .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .card { background: #1a1a1a; border-radius: 16px; padding: 24px; border: 1px solid #2a2a2a; }
  .card h2 { font-size: 16px; color: #aaa; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }
  .status-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
  .status-dot.connected { background: #00d26a; box-shadow: 0 0 8px #00d26a; }
  .status-dot.disconnected { background: #ff4444; }
  .status-dot.waiting { background: #ffaa00; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .status-text { font-size: 20px; font-weight: 600; }
  .phone { color: #aaa; font-size: 14px; margin-top: 8px; }
  #qr-container { text-align: center; }
  #qr-img { max-width: 220px; border-radius: 12px; background: white; padding: 10px; }
  .no-qr { color: #666; font-size: 14px; padding: 40px 0; }
  .btn { background: linear-gradient(135deg, #ff6b00, #ff9500); color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; width: 100%; margin-top: 16px; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .logs-card { background: #1a1a1a; border-radius: 16px; padding: 24px; border: 1px solid #2a2a2a; }
  .logs-card h2 { font-size: 16px; color: #aaa; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }
  #logs-list { max-height: 300px; overflow-y: auto; }
  .log-item { padding: 8px 12px; border-radius: 8px; margin-bottom: 6px; font-size: 13px; display: flex; gap: 10px; align-items: flex-start; }
  .log-item.incoming { background: #1e2d1e; border-left: 3px solid #00d26a; }
  .log-item.outgoing { background: #1e2a35; border-left: 3px solid #4da6ff; }
  .log-item.system { background: #2a2a1e; border-left: 3px solid #ffaa00; }
  .log-time { color: #666; font-size: 11px; white-space: nowrap; }
  .log-msg { color: #ddd; word-break: break-word; }
  .no-logs { color: #555; text-align: center; padding: 30px 0; font-size: 14px; }
  @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>⚡ FlashDrop</h1>
    <span>Painel de Controle WhatsApp</span>
  </div>
</div>
<div class="container">
  <div class="grid">
    <div class="card">
      <h2>Status da Conexão</h2>
      <div>
        <span class="status-dot disconnected" id="status-dot"></span>
        <span class="status-text" id="status-text">Carregando...</span>
      </div>
      <div class="phone" id="status-phone"></div>
      <button class="btn" id="btn-restart" onclick="restart()">🔄 Reconectar</button>
    </div>
    <div class="card">
      <h2>QR Code WhatsApp</h2>
      <div id="qr-container">
        <div class="no-qr" id="qr-loading">Carregando...</div>
        <img id="qr-img" style="display:none" alt="QR Code">
      </div>
    </div>
  </div>
  <div class="card" style="margin-bottom:20px">
  <h2>&#128279; Link do Grupo WhatsApp</h2>
  <p style="color:#888;font-size:13px;margin-bottom:14px">Cole aqui o link de convite do grupo. Quando salvo, o bot envia notificacoes de novos pedidos nesse grupo.</p>
  <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
    <input id="group-link-input" type="text" placeholder="https://chat.whatsapp.com/..." style="flex:1;min-width:200px;padding:11px 14px;background:#111;border:1px solid #333;border-radius:10px;color:#fff;font-size:14px;outline:none">
    <button onclick="salvarGroupLink()" style="padding:11px 20px;background:linear-gradient(135deg,#ff6b00,#ff9500);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap">&#128190; Salvar</button>
    <button onclick="excluirGroupLink()" style="padding:11px 18px;background:#2a1a1a;border:1px solid #cc3333;border-radius:10px;color:#ff4444;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap">&#128465; Excluir</button>
<button onclick="verGrupos()" style="padding:11px 18px;background:#1a2a1a;border:1px solid #00d26a;border-radius:10px;color:#00d26a;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap">&#128101; Ver Grupos</button>
  </div>
  <div id="group-link-msg" style="margin-top:10px;font-size:13px;display:none"></div>
<div id="groups-list" style="display:none;margin-top:12px;"></div>
</div>
<div class="logs-card">
    <h2>📋 Logs de Mensagens</h2>
    <div id="logs-list"><div class="no-logs">Nenhum log ainda...</div></div>
  </div>
</div>
<script>
async function fetchStatus() {
  try {
    const r = await fetch('/api/status');
    const d = await r.json();
    const dot = document.getElementById('status-dot');
    const text = document.getElementById('status-text');
    const phone = document.getElementById('status-phone');
    dot.className = 'status-dot';
    if (d.connected) {
      dot.classList.add('connected');
      text.textContent = 'Conectado';
      phone.textContent = '📱 ' + d.phone;
    } else if (d.state === 'AGUARDANDO_QR') {
      dot.classList.add('waiting');
      text.textContent = 'Aguardando QR';
      phone.textContent = 'Escaneie o QR Code';
    } else {
      dot.classList.add('disconnected');
      text.textContent = d.state || 'Desconectado';
      phone.textContent = '';
    }
  } catch(e) {}
}

async function fetchQR() {
  try {
    const r = await fetch('/api/qrcode');
    const d = await r.json();
    const img = document.getElementById('qr-img');
    const loading = document.getElementById('qr-loading');
    if (d.qr) {
      img.src = d.qr;
      img.style.display = 'block';
      loading.style.display = 'none';
    } else {
      img.style.display = 'none';
      loading.style.display = 'block';
      loading.textContent = 'WhatsApp conectado ou aguardando...';
    }
  } catch(e) {}
}

async function fetchLogs() {
  try {
    const r = await fetch('/api/logs');
    const logs = await r.json();
    const list = document.getElementById('logs-list');
    if (!logs.length) { list.innerHTML = '<div class="no-logs">Nenhum log ainda...</div>'; return; }
    list.innerHTML = logs.slice(0,30).map(l => {
      const t = new Date(l.timestamp).toLocaleTimeString('pt-BR');
      return '<div class="log-item ' + l.type + '"><span class="log-time">' + t + '</span><span class="log-msg">' + escHtml(l.message) + '</span></div>';
    }).join('');
  } catch(e) {}
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function restart() {
  const btn = document.getElementById('btn-restart');
  btn.disabled = true;
  btn.textContent = 'Reiniciando...';
  try {
    await fetch('/api/restart', { method: 'POST' });
  } catch(e) {}
  setTimeout(() => { btn.disabled = false; btn.textContent = '🔄 Reconectar'; }, 3000);
}

function refresh() {
  fetchStatus();
  fetchQR();
  fetchLogs();
}

async function loadGroupLink() {
  try {
    const r = await fetch('/api/group-link');
    const d = await r.json();
    const inp = document.getElementById('group-link-input');
    if (inp && d.link) inp.value = d.link;
  } catch(e) {}
}

async function salvarGroupLink() {
  const inp = document.getElementById('group-link-input');
  const msg = document.getElementById('group-link-msg');
  const link = inp ? inp.value.trim() : '';
  if (!link) { mostrarMsgGrupo('Digite o link do grupo.', '#ff4444'); return; }
  try {
    const r = await fetch('/api/group-link', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ link }) });
    const d = await r.json();
    if (d.ok) mostrarMsgGrupo('&#10003; Link salvo com sucesso!', '#00d26a');
    else mostrarMsgGrupo('Erro ao salvar.', '#ff4444');
  } catch(e) { mostrarMsgGrupo('Erro: ' + e.message, '#ff4444'); }
}

async function excluirGroupLink() {
  if (!confirm('Excluir o link do grupo?')) return;
  try {
    const r = await fetch('/api/group-link', { method: 'DELETE' });
    const d = await r.json();
    if (d.ok) {
      document.getElementById('group-link-input').value = '';
      mostrarMsgGrupo('&#10003; Link removido.', '#ffaa00');
    }
  } catch(e) { mostrarMsgGrupo('Erro: ' + e.message, '#ff4444'); }
}

function mostrarMsgGrupo(texto, cor) {
  const el = document.getElementById('group-link-msg');
  if (!el) return;
  el.innerHTML = texto;
  el.style.color = cor;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}

async function verGrupos() {
  const el = document.getElementById('groups-list');
  if (el.style.display !== 'none') { el.style.display = 'none'; return; }
  el.innerHTML = '<p style="color:#888;font-size:13px">Carregando grupos...</p>';
  el.style.display = 'block';
  try {
    const r = await fetch('/api/groups');
    if (!r.ok) { el.innerHTML = '<p style="color:#ff4444;font-size:13px">Erro ao carregar grupos. Verifique se o bot esta conectado.</p>'; return; }
    const groups = await r.json();
    if (!groups.length) { el.innerHTML = '<p style="color:#888;font-size:13px">Nenhum grupo encontrado. Adicione o bot a um grupo primeiro.</p>'; return; }
    el.innerHTML = '<p style="color:#888;font-size:12px;margin-bottom:8px">Clique no grupo para usar como destino das notificacoes:</p>' +
      groups.map(g => '<button onclick="selecionarGrupo(' + JSON.stringify(g.id) + ')" style="display:block;width:100%;text-align:left;padding:10px 14px;margin-bottom:6px;background:#111;border:1px solid #333;border-radius:8px;color:#fff;font-size:13px;cursor:pointer"><b>' + escHtml(g.name) + '</b><br><span style=\'color:#555;font-size:11px\'>' + g.id + '</span></button>').join('');
  } catch(e) { el.innerHTML = '<p style="color:#ff4444;font-size:13px">Erro: ' + e.message + '</p>'; }
}

function selecionarGrupo(groupId) {
  const inp = document.getElementById('group-link-input');
  if (inp) { inp.value = groupId; }
  document.getElementById('groups-list').style.display = 'none';
  mostrarMsgGrupo('Grupo selecionado! Clique em Salvar para confirmar.', '#ffaa00');
}


loadGroupLink();
refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
